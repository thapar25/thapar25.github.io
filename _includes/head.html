<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="google-site-verification" content="dmfk7YjjgLSJ4BFlkKMqJFti_3UJMjpiorcFr_XYr_A" />
  <meta property="og:image" content="{{ page.image | default: '/assets/og-image.png' | absolute_url }}">
  {%- seo -%}
  <link rel="stylesheet" href="{{ "/assets/main.css" | relative_url }}">
  {%- feed_meta -%}
  {%- if jekyll.environment == 'production' and site.google_analytics -%}
    {%- include google-analytics.html -%}
  {%- endif -%}
  <link rel="icon" href="{{ "/assets/favicon.ico" | relative_url }}" type="image/x-icon">
  <link rel="icon" href="{{ "/assets/favicon.png" | relative_url }}" type="image/png">
  <script>if(localStorage.getItem('dark')==='1')document.documentElement.classList.add('dark');</script>
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Person",
    "name": "Pulkit Thapar",
    "url": "{{ site.url }}",
    "sameAs": [
      "https://twitter.com/{{ site.twitter_username }}",
      "https://linkedin.com/in/{{ site.linkedin_username }}",
      "https://github.com/{{ site.github_username }}"
    ]
  }
  </script>
</head>
